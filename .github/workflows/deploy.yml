name: Update bingo data and deploy

on:
  # No schedule trigger — GitHub's own cron scheduler is unreliable (frequently skips/delays
  # runs well beyond the configured interval). A cron job on the always-on VM instead calls
  # this via workflow_dispatch every 5 minutes, which is actually reliable. Keeping both
  # active caused overlapping runs to collide on the same Pages deployment slot.
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest bingo data
        run: python fetch_bingo_data.py

      # Only commit + redeploy when the sheet actually changed. GitHub Pages' own deployment
      # backend has a real (undocumented, GitHub-side) rate limit that starts throwing
      # "Deployment failed, try again later" if you deploy too often in succession — skipping
      # deploys on no-op checks keeps us well under that, since tile completions happen far
      # less often than the 5-minute check interval.
      - name: Commit updated data.json
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update bingo data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload site artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    if: needs.build.outputs.data_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
